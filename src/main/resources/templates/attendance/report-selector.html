<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Select Report Stream</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="mb-4 d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
    <span class="fw-bold text-dark text-uppercase">🧭 Workspace Hub:</span>
    <div>
      <a th:href="@{/}" class="btn btn-dark btn-sm fw-bold me-2"><i class="bi bi-house-door-fill me-1"></i> 🏠 Home</a>
      <a th:href="@{/admin/students}" class="btn btn-outline-dark btn-sm fw-bold me-2">👥 Students Directory</a>
      <a th:href="@{/admin/subjects}" class="btn btn-outline-dark btn-sm fw-bold me-2">📚 Course Subjects</a>
      <a th:href="@{/admin/attendance}" class="btn btn-outline-dark btn-sm fw-bold me-2">📅 Take Attendance</a>
      <a th:href="@{/admin/attendance/report-selector}" class="btn btn-primary btn-sm fw-bold">📊 Analytics Reports</a>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0">
        <div class="card-header bg-dark text-white text-center py-3">
          <h4 class="mb-0 fw-bold"><i class="bi bi-graph-up-arrow me-2"></i>Performance Analytics Engine</h4>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/admin/attendance/generate-report}" method="get">
            <div class="mb-4">
              <label class="form-label fw-bold text-secondary">Select Active Course Stream</label>
              <select name="subjectId" class="form-select form-select-lg shadow-sm" required>
                <option value="" disabled selected>-- Choose target stream --</option>
                <option th:each="subj : ${subjects}"
                        th:value="${subj.id}"
                        th:text="${subj.subjectName}">Java Programming</option>
              </select>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">Compile Database Report 📈</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
