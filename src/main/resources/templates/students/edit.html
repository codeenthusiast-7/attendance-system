<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Modify Student Records</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/students/update/{id}(id=${student.id})}" th:object="${student}" method="post">
                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Course / Degree</label>
                            <input type="text" th:field="*{course}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">KID (Unique Roll No.)</label>
                            <input type="text" th:field="*{kid}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/students}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-warning">Update Student</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
