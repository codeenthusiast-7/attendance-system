<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Digital Pass</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 d-flex flex-column align-items-center">

    <div class="card shadow border-0 text-center p-4 bg-white" style="width: 350px; border-radius: 1rem;">
        <div class="bg-primary text-white py-3 rounded-top mb-3">
            <h5 class="mb-0 fw-bold tracking-wide text-uppercase">Student Pass</h5>
        </div>
        <div class="card-body">
            <h4 class="fw-bold text-dark mb-1" th:text="${student.name}">Student Name</h4>
            <p class="text-muted mb-4" th:text="'Roll No: ' + ${student.kid}">K24850</p>

            <div class="p-3 bg-light border rounded shadow-sm mb-3 inline-block">
                <img th:src="'data:image/png;base64,' + ${qrCode}" alt="Student QR Code Link" class="img-fluid"/>
            </div>

            <p class="small text-secondary-50 mt-2">Scan code via workspace tracking console camera to mark present instantly</p>
        </div>
    </div>

    <a th:href="@{/admin/students}" class="btn btn-outline-secondary btn-sm fw-bold mt-4">&larr; Back to Directory</a>
</div>
</body>
</html>
