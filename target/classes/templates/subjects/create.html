<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Subject</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Add New Course Stream</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/subjects}" th:object="${subject}" method="post">

                        <div class="mb-4">
                            <label class="form-label fw-bold">Subject / Course Name</label>
                            <input type="text" th:field="*{subjectName}" class="form-control" placeholder="e.g., Object Oriented Programming using Java" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small d-block">Default Faculty Allocation</label>
                            <input type="text" class="form-control bg-light" value="System Administrator (Default)" disabled>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/subjects}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary fw-bold">Save Subject</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
