<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subject Directory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="mb-4 d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
        <span class="fw-bold text-dark text-uppercase">🧭 Workspace Hub:</span>
        <div>
            <a th:href="@{/admin/students}" class="btn btn-outline-dark btn-sm fw-bold me-2">👥 Students Directory</a>
            <a th:href="@{/admin/subjects}" class="btn btn-primary btn-sm fw-bold me-2">📚 Course Subjects</a>
            <a th:href="@{/admin/attendance}" class="btn btn-outline-dark btn-sm fw-bold">📅 Take Attendance</a>
        </div>
    </div>

    <div class="card shadow">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h3 class="mb-0">Course & Subject Management</h3>
            <a th:href="@{/admin/subjects/new}" class="btn btn-primary btn-sm fw-bold">Add New Subject</a>
        </div>
        <div class="card-body">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Subject Name</th>
                    <th>Assigned Faculty</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="subject : ${subjects}">
                    <td th:text="${subject.id}">1</td>
                    <td th:text="${subject.subjectName}">Java Programming</td>
                    <td th:text="${subject.teacher != null ? subject.teacher.username : 'Not Assigned'}">Professor Admin</td>
                    <td>
                        <a th:href="@{/admin/subjects/delete/{id}(id=${subject.id})}" class="btn btn-danger btn-sm fw-bold"
                           onclick="return confirm('Are you sure you want to delete this subject?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(subjects)}">
                    <td colspan="4" class="text-center text-muted py-4">No subjects found in the course directory.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
