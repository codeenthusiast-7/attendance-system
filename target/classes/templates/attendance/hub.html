<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Attendance Workspace Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="mb-4 d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
    <span class="fw-bold text-dark text-uppercase">🧭 Workspace Hub:</span>
    <div>
      <a th:href="@{/}" class="btn btn-dark btn-sm fw-bold me-2"><i class="bi bi-house-door-fill me-1"></i> 🏠 Home</a>
      <a th:href="@{/admin/students}" class="btn btn-outline-dark btn-sm fw-bold me-2">👥 Students Directory</a>
      <a th:href="@{/admin/subjects}" class="btn btn-outline-dark btn-sm fw-bold me-2">📚 Course Subjects</a>
      <a th:href="@{/admin/attendance}" class="btn btn-primary btn-sm fw-bold me-2">📅 Take Attendance</a>
      <a th:href="@{/admin/attendance/report-selector}" class="btn btn-outline-dark btn-sm fw-bold">📊 Analytics Reports</a>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show shadow-sm border-0 mb-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i> <strong>Success!</strong> Attendance roster logs committed cleanly to MySQL database.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white text-center py-3">
          <h4 class="mb-0 fw-bold"><i class="bi bi-calendar2-check me-2"></i>Initialize Roll Call</h4>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/admin/attendance/take}" method="get">

            <div class="mb-3">
              <label class="form-label fw-bold text-secondary">Target Course Stream</label>
              <select name="subjectId" class="form-select form-select-lg shadow-sm" required>
                <option value="" disabled selected>-- Choose Subject --</option>
                <option th:each="subj : ${subjects}"
                        th:value="${subj.id}"
                        th:text="${subj.subjectName}">Java Programming</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold text-secondary">Session Calendar Date</label>
              <input type="date" name="date" class="form-control form-control-lg shadow-sm"
                     th:value="${currentDate}" required>
            </div>

            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">Generate Roster Sheet &rarr;</button>
              <div class="row g-3 mt-2">
                <div class="col-md-6">
                  <button type="submit" th:formaction="@{/admin/attendance/take}" th:formmethod="get" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                    <i class="bi bi-grid-3x3-gap-fill me-2"></i>Manual Grid Sheet
                  </button>
                </div>
                <div class="col-md-6">
                  <button type="submit" th:formaction="@{/admin/attendance/scanner}" th:formmethod="get" class="btn btn-dark btn-lg w-100 fw-bold shadow-sm border-secondary text-info">
                    <i class="bi bi-camera-video-fill me-2"></i>Launch QR Scanner
                  </button>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
