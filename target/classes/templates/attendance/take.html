<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mark Attendance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">

  <div class="mb-4 d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
    <span class="fw-bold text-dark text-uppercase">🧭 Workspace Hub:</span>
    <div>
      <a th:href="@{/}" class="btn btn-dark btn-sm fw-bold me-2"><i class="bi bi-house-door-fill me-1"></i> 🏠 Home</a>
      <a th:href="@{/admin/students}" class="btn btn-outline-dark btn-sm fw-bold me-2">👥 Students Directory</a>
      <a th:href="@{/admin/subjects}" class="btn btn-outline-dark btn-sm fw-bold me-2">📚 Course Subjects</a>
      <a th:href="@{/admin/attendance}" class="btn btn-outline-dark btn-sm fw-bold me-2">📅 Take Attendance</a>
      <a th:href="@{/admin/attendance/report-selector}" class="btn btn-outline-dark btn-sm fw-bold">📊 Analytics Reports</a>
    </div>
  </div>

  <div class="card shadow border-0">
    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center py-3">
      <div>
        <h3 class="mb-0 fw-bold" th:text="${subject.subjectName}">Subject Name</h3>
        <small class="text-white-50 fw-bold">📅 Session Date: <span th:text="${date}">2026-05-19</span></small>
      </div>
      <a th:href="@{/admin/attendance}" class="btn btn-sm btn-outline-light fw-bold">&larr; Change Selection</a>
    </div>
    <div class="card-body">

      <form th:action="@{/admin/attendance/save}" th:object="${rosterWrapper}" method="post">

        <table class="table table-striped table-hover align-middle">
          <thead class="table-dark">
          <tr>
            <th>ID Mapping</th>
            <th>Student Name</th>
            <th>KID (Roll No.)</th>
            <th class="text-center" style="width: 250px;">Attendance Status</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="item, stat : *{list}">

            <input type="hidden" th:name="|list[${stat.index}].id|" th:value="${item.id}" />
            <input type="hidden" th:name="|list[${stat.index}].student.id|" th:value="${item.student.id}" />
            <input type="hidden" th:name="|list[${stat.index}].subject.id|" th:value="${item.subject.id}" />
            <input type="hidden" th:name="|list[${stat.index}].date|" th:value="${item.date}" />

            <td th:text="${item.student.id}">1</td>
            <td th:text="${item.student.name}" class="fw-bold text-secondary">Gaurav Gochar</td>
            <td th:text="${item.student.kid}" class="text-monospace">K24850</td>

            <td>
              <div class="d-flex justify-content-around bg-white p-2 border rounded shadow-sm">
                <div class="form-check form-check-inline mb-0">
                  <input class="form-check-input" type="radio" value="Present"
                         th:name="|list[${stat.index}].status|"
                         th:checked="${item.status == 'Present' || item.status == null}"
                         th:id="'p-' + ${stat.index}"/>
                  <label class="form-check-label text-success fw-bold" th:for="'p-' + ${stat.index}">Present</label>
                </div>
                <div class="form-check form-check-inline mb-0">
                  <input class="form-check-input" type="radio" value="Absent"
                         th:name="|list[${stat.index}].status|"
                         th:checked="${item.status == 'Absent'}"
                         th:id="'a-' + ${stat.index}"/>
                  <label class="form-check-label text-danger fw-bold" th:for="'a-' + ${stat.index}">Absent</label>
                </div>
              </div>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="d-flex justify-content-end mt-4">
          <button type="submit" class="btn btn-success btn-lg px-5 fw-bold shadow-sm">Commit Attendance Sheet 💾</button>
        </div>
      </form>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
