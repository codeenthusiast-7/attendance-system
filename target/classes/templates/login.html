<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>AMS - Secure Portal Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div th:if="${param.error}" class="alert alert-danger shadow-sm border-0 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password entry.
            </div>

            <div th:if="${param.logout}" class="alert alert-success shadow-sm border-0 mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> You have logged out successfully.
            </div>

            <div class="card login-card bg-white p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <div class="display-5 text-primary mb-2"><i class="bi bi-shield-lock-fill"></i></div>
                        <h3 class="fw-bold text-dark mb-1 text-uppercase tracking-wider">Secure Portal</h3>
                        <p class="text-muted small">Attendance Management Framework Access Gateway</p>
                    </div>

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-person-fill"></i></span>
                                <input type="text" name="username" class="form-control border-start-0 bg-light" placeholder="Enter username" required autofocus>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-secondary small fw-bold">Security Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-key-fill"></i></span>
                                <input type="password" name="password" class="form-control border-start-0 bg-light" placeholder="Enter secure password" required>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm py-2">Authenticate Access &rarr;</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-4">
                <small class="text-white-50 fw-semibold">&copy; 2026 Academic Management System Framework Core</small>
            </div>

        </div>
    </div>
</div>

</body>
</html>
